<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feedback - MD Login Failed</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell">
    <section class="feedback-card">
      <div class="brand-row">
        <div class="brand-mark">MD</div>
        <div>
          <p class="eyebrow">Multi Dynamic</p>
          <h1>Login failed</h1>
        </div>
      </div>
      <div class="status error">
        The Blink SSO login did not complete successfully.
      </div>
      <p class="intro">
        Please ask the developer to check the Blink certificate, Entity ID, ACS URL, Login URL, and attribute mappings.
      </p>
      <a class="button" href="/login">Try again</a>
    </section>
  </main>
</body>
</html>
