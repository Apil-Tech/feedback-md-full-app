<IfModule mod_ssl.c>
<VirtualHost *:443>

    ServerName feedback.multidynamic.com.au

    ProxyPreserveHost On
    ProxyRequests Off

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"
    RequestHeader set X-Forwarded-Ssl "on"

    Header always unset X-Frame-Options
    Header always unset Cross-Origin-Opener-Policy
    Header always unset Cross-Origin-Resource-Policy
    Header always unset Content-Security-Policy

    ProxyPass / http://127.0.0.1:3000/
    ProxyPassReverse / http://127.0.0.1:3000/

    ErrorLog ${APACHE_LOG_DIR}/feedback-error.log
    CustomLog ${APACHE_LOG_DIR}/feedback-access.log combined

    SSLCertificateFile /etc/letsencrypt/live/feedback.multidynamic.com.au/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/feedback.multidynamic.com.au/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

</VirtualHost>
</IfModule>